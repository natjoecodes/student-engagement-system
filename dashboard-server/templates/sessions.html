<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Sessions</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- SAME GLOBAL STYLES -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- ================= NAVBAR (COPIED, NOT INCLUDED) ================= -->

<nav class="navbar">

  <div class="nav-left">
    <a href="/dashboard" class="logo" style="text-decoration:none; color:inherit;">
  <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="College Logo" />
  <span class="logo-text">
    <span class="logo-line-1">Government Engineering</span>
    <span class="logo-line-2">College Kozhikode</span>
  </span>
</a>
</nav>

<!-- ================= MAIN CONTENT ================= -->

<main class="sessions-page">

  <!-- HEADER -->
  <section class="sessions-header">
    <h2>History of Classes</h2>

    <div class="session-search-hero">
      <i class="fas fa-search"></i>
      <input
        type="text"
        id="sessionSearch"
        placeholder="Search by subject, faculty, or date"
      />
      <button class="search-btn">Search</button>
    </div>
  </section>

  <!-- SESSION LIST -->
<section class="sessions-list-wrapper">
  <div class="session-list">

    <div class="session-row session-row-header">
      <input type="checkbox" id="selectAll" />
      <span>Session</span>
      <span>Start Time</span>
      <span>Duration</span>
      <span></span>
    </div>

    <div id="allSessionsList">
      <!-- rows injected here -->
    </div>

  </div>
</section>

  <!-- SESSION OVERVIEW (HIDDEN INITIALLY) -->
  <section class="session-overview-wrapper hidden" id="sessionOverview">
    <!-- reuse your existing overview card -->
  </section>
</main>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
