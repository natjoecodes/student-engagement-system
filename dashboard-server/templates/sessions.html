<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Sessions</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" sizes="96x96"
      href="{{ url_for('static', filename='assets/favicon.png') }}">

  <!-- SAME GLOBAL STYLES -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- ================= NAVBAR (COPIED, NOT INCLUDED) ================= -->

<nav class="navbar">

  <div class="nav-left">
    <a href="/dashboard" class="logo" style="text-decoration:none; color:inherit;">
  <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="College Logo" />
  <span class="logo-text">
    <span class="logo-line-1">Government Engineering</span>
    <span class="logo-line-2">College Kozhikode</span>
  </span>
</a>
</nav>

<!-- ================= MAIN CONTENT ================= -->

<main class="sessions-page">

  <!-- HEADER -->
  <section class="sessions-header">
    <div class="sessions-title-row">
  <button class="back-btn" id="backBtn" aria-label="Go back">
    <i class="fas fa-arrow-left"></i>
  </button>
  <h2 class="sessions-title">History of Classes</h2>
</div>

    <div class="session-search-hero">
      <i class="fas fa-search"></i>
      <input
        type="text"
        id="sessionSearch"
        placeholder="Search by subject, faculty, or date"
      />
      <button class="search-btn">Search</button>
    </div>
  </section>

  <!-- SESSION LIST -->
<section class="sessions-list-wrapper">
  <div class="session-list">

<div class="session-row session-row-header">
  <span>Session</span>
  <span>Start Time</span>
  <span>Duration</span>
  <div class="row-action">
  <button id="selectToggle" class="select-toggle-btn">
    Select
  </button>
</div>
</div>

<div class="selection-toolbar" id="selectionToolbar">
  <span class="selection-count">
    0 Sessions Selected
  </span>

  <div class="selection-actions">
    <button class="bulk-delete-btn">
      <i class="fas fa-trash"></i>
      Delete
    </button>
  </div>
</div>

    <div id="allSessionsList">
      <!-- rows injected here -->
    </div>

  </div>
</section>

  <!-- SESSION OVERVIEW (HIDDEN INITIALLY) -->
  <section class="session-overview-wrapper hidden" id="sessionOverview">
    <!-- reuse your existing overview card -->
  </section>
</main>
<!-- DELETE CONFIRMATION MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <button class="modal-close" id="closeDeleteModal">✕</button>
    <h3 id="deleteModalTitle">Delete session?</h3>
    <p id="deleteModalText">
      This action cannot be undone.
    </p>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="cancelDelete">Cancel</button>
      <button class="modal-btn confirm" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
